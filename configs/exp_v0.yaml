experiment:
  name: "mcmipf_v0_H6h"
  seed: 42
  freq: "10min"
  timezone: "America/Bogota"

sites:
  uniandes:
    id: "uniandes"
    ground_path: "data_raw/Data_Uniandes_tierra.csv"
  elpaso:
    id: "elpaso"
    ground_path: "data_raw/Data_ElPaso_tierra.csv"

ground_schema:
  timestamp_col_candidates: ["timestamp", "datetime", "time", "fecha", "Fecha"]
  ghi_col_candidates: ["ghi", "GHI", "ghi_qc", "ghi_sg_definitive"]
  ghi_lag1_candidates: ["ghi_lag1", "ghi_qc_lag1", "ghi_sg_definitive_lag1"]

mcmipf:
  root_dir: "data_processed/GOES_v2/MCMIPF"
  file_glob: "{YYYY}/{MM}/{YYYYMMDD}_{HH}*MCMIPF*.npz"
  channels: "auto"

forecast:
  # 6 horas = 360 min. Con freq=10min → 36 pasos
  horizon_steps: 36
  horizon_hours: 6.0

history:
  # 4 horas = 240 min. Con freq=10min → 24 pasos
  # NOTE: manifests were built with L=24 (authoritative). This field must stay
  # consistent with the manifest build notebook (04_Manifest Build.ipynb).
  history_steps: 24
  history_hours: 4.0

patch:
  size: 16         # pixels, must be even
  channels: 16     # GOES MCMIPF channels used

# Splits are defined per-site in scripts/04_build_manifests.py (authoritative).

output:
  manifest_dir: "data/datasets/manifest_v1"
  patches_dir:  "data/patches_v1"
  ground_dir:   "data/ground_aligned"
  runs_dir:     "runs"
  figures_dir:  "runs/figures"
